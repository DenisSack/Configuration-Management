---
- name: Ensure web root exists
  file:
    path: "{{ app_web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Upload static website tarball
  copy:
    src: "{{ app_tarball_src }}"
    dest: /tmp/website.tar.gz
    mode: '0644'

- name: Extract tarball into web root
  unarchive:
    src: /tmp/website.tar.gz
    dest: "{{ app_web_root }}"
    remote_src: yes
    owner: www-data
    group: www-data
    mode: '0644'
    creates: "{{ app_web_root }}/index.html"   # optional idempotence

- name: Remove temporary tarball
  file:
    path: /tmp/website.tar.gz
    state: absent
