---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Ensure docroot directory exists
  file:
    path: "{{ nginx_docroot }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_user }}"
    mode: '0755'

- name: Deploy nginx site configuration
  template:
    src: mywebsite.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_site_name }}
    mode: '0644'
  notify: reload nginx

- name: Enable site (remove default if present)
  file:
    src: /etc/nginx/sites-available/{{ nginx_site_name }}
    dest: /etc/nginx/sites-enabled/{{ nginx_site_name }}
    state: link
  notify: reload nginx

- name: Remove default nginx site if enabled
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure nginx is running and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes

  handlers:
    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
