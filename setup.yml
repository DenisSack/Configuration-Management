---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes

- name: Install base utilities
  apt:
    name: "{{ base_packages }}"
    state: present

- name: Configure and enable fail2ban
  systemd:
    name: fail2ban
    enabled: yes
    state: started

- name: Configure UFW – allow SSH and HTTP/HTTPS
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '22'
    - '80'
    - '443'

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
